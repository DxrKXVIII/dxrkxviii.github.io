<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>The Void</title>
    
    <style>
        /* Aquí va la "pintura" de tu página */
        body {
            background-color: black; /* Fondo negro total */
            color: white;            /* Letras blancas para que se vean */
            margin: 0;               /* Quita bordes raros */
            height: 100vh;           /* Que use todo el alto de la pantalla */
            
            /* Esto centra todo el contenido mágicamente */
            display: flex;
            justify-content: center;
            align-items: center;
            
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 {
            font-size: 5rem;         /* Un tamaño grandote */
            letter-spacing: 10px;    /* Espacio entre letras para que se vea "void" */
            text-transform: uppercase; /* Todo en mayúsculas */
        }
    </style>
</head>
<body>

    <h1>The Void</h1>

</body>
</html>
