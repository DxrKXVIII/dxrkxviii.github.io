<style>

    margin: 0;

    /* Esto hace que la imagen cubra todo el fondo sin deformarse */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed; /* Esto le da un efecto pro al scrollear */
    
    color: white;
    text-align: center;
    font-family: 'Times New Roman', serif;
    
    /* Flexbox para centrar el contenido (opcional pero recomendado) */
    display: flex;

  }
</style>
